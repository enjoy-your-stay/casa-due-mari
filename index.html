<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>La Casa dei Due Mari – Language Selection</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main style="max-width: 400px; margin: 80px auto; text-align: center;">
    <h1>La Casa dei Due Mari</h1>
    <p>Select your language / Seleziona la lingua / Choisissez la langue / Wählen Sie die Sprache</p>
    <select id="lang-select">
      <option value="en">🇬🇧 English</option>
      <option value="it">🇮🇹 Italiano</option>
      <option value="fr">🇫🇷 Français</option>
      <option value="de">🇩🇪 Deutsch</option>
    </select>
    <button onclick="goLang()">Go</button>
  </main>
  <script src="script/script.js"></script>
  <script>
    // Detect browser language
    const supported = ['en', 'it', 'fr', 'de'];
    const browserLang = navigator.language.slice(0,2);
    if (supported.includes(browserLang)) {
      window.location.href = browserLang + '.html';
    }
    function goLang() {
      const lang = document.getElementById('lang-select').value;
      window.location.href = lang + '.html';
    }
  </script>
</body>
</html>
